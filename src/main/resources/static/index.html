<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OutfitBuddy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>OutfitBuddy</h1>
        <p>Verwalte deine Outfits an einem Ort</p>
    </header>

    <main>
        <section class="form-section">
            <h2 id="form-title">Neues Outfit</h2>
            <form id="outfit-form">
                <input type="hidden" id="outfit-id">
                <label for="name">Name</label>
                <input type="text" id="name" required placeholder="z.B. Blaues Hemd mit Jeans">

                <label for="category">Kategorie</label>
                <input type="text" id="category" required placeholder="z.B. Casual, Business, Sport">

                <label for="lastWorn">Zuletzt getragen</label>
                <input type="date" id="lastWorn">

                <div class="form-actions">
                    <button type="submit" id="submit-btn">Hinzufügen</button>
                    <button type="button" id="cancel-btn" class="secondary" hidden>Abbrechen</button>
                </div>
            </form>
        </section>

        <section class="list-section">
            <h2>Meine Outfits</h2>
            <table id="outfit-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Kategorie</th>
                        <th>Zuletzt getragen</th>
                        <th>Aktionen</th>
                    </tr>
                </thead>
                <tbody id="outfit-list"></tbody>
            </table>
            <p id="empty-message" hidden>Noch keine Outfits vorhanden.</p>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
